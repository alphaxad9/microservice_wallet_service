# ============================================
# WALLET SERVICE HELM CHART - COMPLETE VALUES
# ============================================

# Namespace configuration
namespace: wallet-service

# Service configuration
service:
  name: wallet-service
  port: 8000

# ConfigMap name (used by all deployments)
configMap:
  name: wallet-config

# ============================================
# DEPLOYMENTS CONFIGURATION
# ============================================
deployments:
  api:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  producer:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"
  
  rabbitmqConsumer:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

# ============================================
# BACKEND CONFIGURATION
# ============================================
backend:
  wallet:
    image:
      repository: alphaxad9/wallet_service
      tag: "0.0.6"
      pullPolicy: IfNotPresent
    port: 8000

# ============================================
# CONFIGURATION VALUES (for ConfigMap)
# ============================================
config:
  wallet:
    # Service Identity
    serviceName: "wallet"
    
    # Django Core
    djangoSettingsModule: "wallet_service.settings"
    djangoDebug: "True"
    djangoAllowedHosts: "wallet-service,wallet-service.wallet-service.svc.cluster.local,localhost,127.0.0.1,wallet.local,172.18.0.100"
    djangoLanguageCode: "en-us"
    djangoTimeZone: "UTC"
    defaultFromEmail: "noreply@example.com"
    logLevel: "DEBUG"
    
    # Database
    postgresEngine: "django.db.backends.postgresql"
    postgresHost: "postgres.infrastructure.svc.cluster.local"
    postgresPort: "5432"
    postgresDb: "walletdb"
    dbHost: "postgres.infrastructure.svc.cluster.local"
    dbPort: "5432"
    dbName: "walletdb"
    
    # Auth Service
    authServiceUrl: "http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one/"
    authPublicKeyUrl: "http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one/users/public_key/"
    
    # RabbitMQ
    rabbitmqHost: "rabbitmq.infrastructure.svc.cluster.local"
    rabbitmqPort: "5672"
    rabbitmqQueue: "wallet_service.commands"
    rabbitmqVhost: "microservice_one"
    
    # Kafka
    kafkaBrokers: "kafka-cluster-kafka-bootstrap.kafka-operator.svc.cluster.local:9092"
    kafkaTopic: "microservice_one.events"
    kafkaGroupId: "wallet_service_id"
    kafkaSecurityProtocol: "PLAINTEXT"
    kafkaEnableAutoCommit: "true"
    kafkaAutoOffsetReset: "earliest"
    
    # Redis
    redisHost: "redis.infrastructure.svc.cluster.local"
    redisPort: "6379"
    redisDb: "0"
    redisSocketTimeout: "2"
    redisConnectTimeout: "2"
    redisRetryOnTimeout: "true"
    
    # Cache TTLs
    likesCacheTtl: "300"
    authorTimelineCacheTtl: "120"
    
    # Channel Layers
    channelLayerHosts: "redis.infrastructure.svc.cluster.local:6379"
    channelLayerCapacity: "1000"
    channelLayerExpiry: "10"
    
    # CORS Settings
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://localhost:8001,http://172.18.0.100"
    csrfTrustedOrigins: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://localhost:8001,http://172.18.0.100"
    corsAllowCredentials: "True"

# ============================================
