# ============================================
# PERSISTENCE CONFIGURATION
# ============================================
persistence:
  enabled: true
  static:
    size: 5Gi
  media:
    size: 10Gi

# ============================================
# INGRESS CONFIGURATION
# ============================================
ingress:
  enabled: true
  host: wallet.local

# ============================================
# SERVICE ACCOUNT CONFIGURATION
# ============================================
serviceAccount:
  create: true
  name: wallet-service-sa
  automount: true
  annotations: {}

# ============================================
# MISC CONFIGURATION
# ============================================
replicaCount: 1

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Node configuration
nodeSelector: {}
tolerations: []
affinity: {}

# HTTPRoute (if using Gateway API)
httpRoute:
  enabled: false