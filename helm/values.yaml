replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "helm-wallet"

config:
  rabbitmq:
    host: "rabbitmq.infrastructure.svc.cluster.local"  
    port: "5672"     
    vhost: "microservice_one"       
    queues:
      booking: "booking_service.commands"         
      payment: "microservice_one.events"
      wallet: "wallet_service.commands"
  
  redis:
    host: "redis.infrastructure.svc.cluster.local"
    port: "6379"
    db: "0"
    socketTimeout: "2"
    connectTimeout: "2"
    retryOnTimeout: "true"
  
  django:
    settingsModule: "wallet_service.settings"
    debug: "False"
    allowedHosts: "*"
    defaultFromEmail: "noreply@example.com"
    logLevel: "INFO"
    
  nginx:
    useProxyProtocol: "false"
    sslRedirect: "true"
    forceSslRedirect: "true"
    hsts: "true"
    hstsMaxAge: "15724800"
    hstsIncludeSubdomains: "true"
    proxyBodySize: "10m"
    upstreamKeepaliveConnections: "100"
    workerProcesses: "4"
    logFormatEscapeJson: "true"
    enableBrotli: "true"
  
  services:
    wallet:
      cacheTtl: {}
    
  postgres:
    host: "postgres.infrastructure.svc.cluster.local"
    port: "5432"
    db: "walletdb"

  kafka:
    brokers: "kafka.infrastructure.svc.cluster.local:9092"
    topic: "microservice_one.events"
    groupId: "wallet_service_id"
    securityProtocol: "PLAINTEXT"
    enableAutoCommit: "true"
    autoOffsetReset: "earliest"

  wallet:
    # Django Core
    djangoDebug: "False"
    djangoAllowedHosts: "*"
    djangoLanguageCode: "en-us"
    djangoTimeZone: "UTC"
    djangoSettingsModule: "wallet_service.settings"
    defaultFromEmail: "noreply@example.com"
    logLevel: "INFO"
    port: "8000"
    
    # Database
    postgresEngine: "django.db.backends.postgresql"
    postgresHost: "postgres.infrastructure.svc.cluster.local"
    postgresPort: "5432"
    postgresDb: "walletdb"
    
    # Auth
    internalApiKey: "super-secret-internal-key-change-in-prod"
    serviceJwt: "my_jwt_secret_123!"
    jwtSecret: "my_jwt_secret_123!"
    authServiceUrl: "http://auth-service:8000/zedvye_one/"
    authPublicKeyUrl: "http://auth-service:8000/zedvye_one/users/public_key/"
    walletService: "http://wallet-service:8001/wallet_service/wallets/by-user/"
    
    # RabbitMQ
    rabbitmqHost: "rabbitmq.infrastructure.svc.cluster.local"
    rabbitmqPort: "5672"
    rabbitmqQueue: "wallet_service.commands"
    rabbitmqVhost: "microservice_one"
    
    # Kafka
    kafkaBrokers: "kafka.infrastructure.svc.cluster.local:9092"
    kafkaTopic: "microservice_one.events"
    kafkaGroupId: "wallet_service_id"
    kafkaSecurityProtocol: "PLAINTEXT"
    kafkaEnableAutoCommit: "true"
    kafkaAutoOffsetReset: "earliest"
    
    # Redis
    redisHost: "redis.infrastructure.svc.cluster.local"
    redisPort: "6379"
    redisDb: "0"
    redisSocketTimeout: "2"
    redisConnectTimeout: "2"
    redisRetryOnTimeout: "true"
    
    # Cache TTLs
    likesCacheTtl: "300"
    authorTimelineCacheTtl: "120"
    
    # Channel Layers
    channelLayerHosts: "redis.infrastructure.svc.cluster.local:6379"
    channelLayerCapacity: "1000"
    channelLayerExpiry: "10"
    
    # CORS Settings
    corsAllowedOrigins: "http://localhost:3000,https://yourdomain.com"
    csrfTrustedOrigins: "http://localhost:3000,https://yourdomain.com"
    corsAllowCredentials: "True"

backend:
  wallet:
    image:
      repository: alphaxad9/wallet_service
      tag: "0.0.3"
    port: 8000
    
    # Django Core
    djangoDebug: "False"
    djangoAllowedHosts: "*"
    djangoLanguageCode: "en-us"
    djangoTimeZone: "UTC"
    djangoSettingsModule: "wallet_service.settings"
    defaultFromEmail: "noreply@example.com"
    logLevel: "INFO"
    
    # Database
    postgresEngine: "django.db.backends.postgresql"
    postgresHost: "postgres.infrastructure.svc.cluster.local"
    postgresPort: "5432"
    postgresDb: "walletdb"
    
    # Auth
    internalApiKey: "super-secret-internal-key-change-in-prod"
    serviceJwt: "my_jwt_secret_123!"
    jwtSecret: "my_jwt_secret_123!"
    authServiceUrl: "http://auth-service:8000/zedvye_one/"
    authPublicKeyUrl: "http://auth-service:8000/zedvye_one/users/public_key/"
    walletService: "http://wallet-service:8001/wallet_service/wallets/by-user/"
    
    # RabbitMQ
    rabbitmqHost: "rabbitmq.infrastructure.svc.cluster.local"
    rabbitmqPort: "5672"
    rabbitmqQueue: "wallet_service.commands"
    rabbitmqVhost: "microservice_one"
    
    # Kafka
    kafkaBrokers: "kafka.infrastructure.svc.cluster.local:9092"
    kafkaTopic: "microservice_one.events"
    kafkaGroupId: "wallet_service_id"
    kafkaSecurityProtocol: "PLAINTEXT"
    kafkaEnableAutoCommit: "true"
    kafkaAutoOffsetReset: "earliest"
    
    # Redis
    redisHost: "redis.infrastructure.svc.cluster.local"
    redisPort: "6379"
    redisDb: "0"
    redisSocketTimeout: "2"
    redisConnectTimeout: "2"
    redisRetryOnTimeout: "true"
    
    # Cache TTLs
    likesCacheTtl: "300"
    authorTimelineCacheTtl: "120"
    
    # Channel Layers
    channelLayerHosts: "redis.infrastructure.svc.cluster.local:6379"
    channelLayerCapacity: "1000"
    channelLayerExpiry: "10"
    
    # CORS Settings
    corsAllowedOrigins: "http://localhost:3000,https://yourdomain.com"
    csrfTrustedOrigins: "http://localhost:3000,https://yourdomain.com"
    corsAllowCredentials: "True"

secrets:
  rabbitmq: rabbitmq-credentials
  postgres: postgres-credentials
  kafka: kafka-credentials
  wallet: helm-wallet

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers

resources: {}

livenessProbe:
  httpGet:
    path: /health/
    port: http
  initialDelaySeconds: 10
  periodSeconds: 0
  timeoutSeconds: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 1
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/
    port: http
  failureThreshold: 30
  periodSeconds: 10
  timeoutSeconds: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}